function renderProducts(){var products=filteredProducts();g("products").innerHTML=products.length?products.map(function(p){var qty=cart[p.id]?cart[p.id].qty:0;var inStock=p.stock!==false&&(p.stokAdet==null||p.stokAdet>0);var stockHtml=inStock?"<div class='stock-note ok'>Stokta var</div>":"<div class='stock-note out'>Stokta yok</div><button type='button' class='btn btn-soft' style='padding:7px 10px;font-size:13px;margin-top:4px' data-termin='"+encodeURIComponent(p.id)+"'>Termin tarihini sor</button>";var img=p.img?"<img src='"+p.img+"' alt=''>":"<div style='height:140px;border-radius:14px;background:linear-gradient(180deg,#f7fbfd 0%,#edf4f8 100%)'></div>";return "<div class='product"+(inStock?"":" out")+"'>"+img+"<div class='name'>"+(p.name||"")+"</div><div class='meta'><div><strong>MANN:</strong> "+(p.mann||"-")+"</div><div><strong>OEM:</strong> "+(p.oem||"-")+"</div><div><strong>Grup:</strong> "+(p.groupLabel||"-")+" / "+(p.type||"-")+"</div></div>"+stockHtml+"<div class='price'>"+money(p.price||0)+"<small>+ KDV</small></div><div class='qty'><input type='number' min='0' value='"+qty+"' data-qty='"+encodeURIComponent(p.id)+"'><button class='btn btn-brand' data-add='"+encodeURIComponent(p.id)+"'>Ekle</button></div></div>";}).join(""):"<div class='empty'>Urun bulunamadi.</div>";Array.prototype.forEach.call(g("products").querySelectorAll("[data-qty]"),function(input){input.onchange=function(){setQty(decodeURIComponent(this.dataset.qty),this.value);};});Array.prototype.forEach.call(g("products").querySelectorAll("[data-add]"),function(btn){btn.onclick=function(){var id=decodeURIComponent(this.dataset.add);setQty(id,(cart[id]?cart[id].qty:0)+1);};});Array.prototype.forEach.call(g("products").querySelectorAll("[data-termin]"),function(btn){btn.onclick=function(){sendTerminMessage(decodeURIComponent(this.dataset.termin));};});}
function renderCart(){var ids=Object.keys(cart),subtotal=0,invoiceOn=g("wantInvoice").checked;g("cartCount").textContent=ids.length+" urun";g("cartList").innerHTML=ids.length?ids.map(function(id){var item=cart[id];var line=(item.product.price||0)*item.qty;var inStock=item.product.stock!==false&&(item.product.stokAdet==null||item.product.stokAdet>0);subtotal+=line;return "<div class='cart-item'><div><strong>"+(item.product.mann||"")+"</strong></div><div class='small'>"+(item.product.name||"")+"</div><div class='small'>"+item.qty+" adet x "+money(item.product.price||0)+" + KDV</div>"+(!inStock?"<div class='small' style='color:#b24d3f;font-weight:700;margin-top:4px'>Stokta yok. <button type='button' class='btn btn-soft' style='padding:4px 8px;font-size:12px;margin-left:4px' data-termin='"+encodeURIComponent(id)+"'>Termin tarihini sor</button></div>":"")+"<div style='display:flex;justify-content:space-between;align-items:center;margin-top:6px'><strong>"+money(line)+"</strong><button class='btn btn-soft' data-remove='"+encodeURIComponent(id)+"'>Sil</button></div></div>";}).join(""):"<div class='empty'>Sepetiniz bos.</div>";var vat=invoiceOn?subtotal*0.2:0;g("cartSubtotal").textContent=money(subtotal);g("cartVat").textContent=money(vat);g("vatRow").style.display=invoiceOn?"flex":"none";g("cartTotal").textContent=money(subtotal+vat);Array.prototype.forEach.call(g("cartList").querySelectorAll("[data-remove]"),function(btn){btn.onclick=function(){setQty(decodeURIComponent(this.dataset.remove),0);};});Array.prototype.forEach.call(g("cartList").querySelectorAll("[data-termin]"),function(btn){btn.onclick=function(){sendTerminMessage(decodeURIComponent(this.dataset.termin));};});}

async function loadCatalog(){var res=await fetch(rowUrl(),{method:"GET",headers:headers()});if(!res.ok)throw new Error("HTTP "+res.status);var raw=await res.json();if(!raw||!raw.length||!raw[0].payload)throw new Error("Katalog bulunamadi");applyPayload(raw[0].payload);}
