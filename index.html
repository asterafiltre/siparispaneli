<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>ASTERA TİCARET – Sipariş Paneli</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#edf4f8;--card:#fff;--line:#c4d3dd;--text:#18384f;--muted:#60798c;
  --brand:#1d5279;--green:#2e6f52;--soft:#e6f0f6;--accent:#4f8db5;
  --hava:#2d7ab5;--yag:#5a7a90;--polen:#7a92ac;--yakit:#1d4d66;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:"Inter",sans-serif;background:linear-gradient(135deg,#edf4f8 0%,#f5f9fc 100%);color:var(--text);font-size:15px;min-height:100vh}
.wrap{max-width:1240px;margin:0 auto;padding:16px;display:grid;grid-template-columns:minmax(0,1fr) 340px;gap:16px}
@media(max-width:920px){.wrap{grid-template-columns:1fr}}
/* Card */
.card{background:#fff;border:1px solid rgba(100,155,195,.22);border-radius:20px;box-shadow:0 8px 32px rgba(29,82,121,.07);overflow:hidden}
/* Header */
.head{padding:20px 22px;border-bottom:1px solid rgba(100,155,195,.18);display:flex;align-items:center;gap:20px;background:linear-gradient(135deg,#1d5279 0%,#2d7ab5 100%)}
.logo-wrap{flex-shrink:0}
.logo-wrap img{height:80px;max-width:220px;object-fit:contain;filter:drop-shadow(0 4px 12px rgba(0,0,0,.25))}
.logo-fb{width:72px;height:72px;border-radius:16px;background:rgba(255,255,255,.2);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:900;font-size:28px;border:2px solid rgba(255,255,255,.35)}
.head-text{color:#fff}
.head-title{font-size:26px;font-weight:900;letter-spacing:-.01em;line-height:1.1}
.head-sub{font-size:14px;font-weight:600;opacity:.75;margin-top:3px}
/* Body */
.body{padding:18px 20px}
/* Form */
.form-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:10px;margin-bottom:12px}
.fg{display:flex;flex-direction:column;gap:4px}
.fg label{font-size:12px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.05em}
.fg input,.fg select{padding:10px 12px;border:1.5px solid var(--line);border-radius:10px;font-size:14px;font-family:inherit;color:var(--text);background:#fff;transition:border-color .15s}
.fg input:focus,.fg select:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px rgba(79,141,181,.12)}
.check-row{display:flex;align-items:center;gap:10px;padding:10px 14px;border:1.5px solid var(--line);border-radius:10px;background:#f8fbfd;cursor:pointer;font-size:14px;font-weight:600}
.check-row input{width:16px;height:16px;accent-color:var(--brand)}
.invoice-grid{display:none;margin-top:10px}
.invoice-grid.open{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:10px}
/* Search */
.search-wrap{margin-top:14px;position:relative}
.search{width:100%;padding:11px 14px 11px 38px;border:1.5px solid var(--line);border-radius:12px;font-size:14px;font-family:inherit;background:#fff;color:var(--text);transition:border-color .15s}
.search:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px rgba(79,141,181,.12)}
.search-icon{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--muted);font-size:16px;pointer-events:none}
/* Tabs */
.tabs{display:flex;gap:4px;flex-wrap:wrap;margin-top:14px;border-bottom:2px solid var(--line);padding-bottom:0}
.tab{padding:9px 14px;border:none;background:transparent;cursor:pointer;font-size:13px;font-weight:700;color:var(--muted);border-bottom:3px solid transparent;margin-bottom:-2px;border-radius:8px 8px 0 0;transition:all .15s;font-family:inherit}
.tab:hover{color:var(--text);background:rgba(79,141,181,.07)}
.tab.active{color:var(--brand);border-bottom-color:var(--brand);background:rgba(29,82,121,.05)}
.type-tab[data-type="Hava"].active,.type-tab[data-type="Hava"].active{color:var(--hava);border-bottom-color:var(--hava)}
.type-tab[data-type="Yag"].active,.type-tab[data-type="Yag"].active{color:var(--yag);border-bottom-color:var(--yag)}
.type-tab[data-type="Polen"].active{color:var(--polen);border-bottom-color:var(--polen)}
.type-tab[data-type="Yakit"].active,.type-tab[data-type="Yakit"].active{color:var(--yakit);border-bottom-color:var(--yakit)}
/* Products */
.products{display:grid;grid-template-columns:repeat(auto-fill,minmax(210px,1fr));gap:12px;margin-top:14px}
.product{background:#fff;border:1.5px solid rgba(100,155,195,.2);border-radius:16px;padding:14px;display:flex;flex-direction:column;gap:8px;transition:box-shadow .18s,transform .18s}
.product:hover{box-shadow:0 8px 28px rgba(29,82,121,.12);transform:translateY(-2px)}
.product.out{opacity:.7;border-color:rgba(180,77,63,.2)}
.prod-img-wrap{width:100%;height:130px;border-radius:12px;background:linear-gradient(135deg,#f2f8fc,#e8f2f8);display:flex;align-items:center;justify-content:center;overflow:hidden}
.prod-img-wrap img{max-width:100%;max-height:100%;object-fit:contain}
.prod-img-placeholder{font-size:40px;opacity:.3}
.prod-name{font-weight:800;font-size:14px;line-height:1.35;color:var(--text)}
.prod-meta{font-size:12px;color:var(--muted);line-height:1.7}
.prod-meta strong{color:var(--text);font-weight:700}
.stock-ok{font-size:12px;font-weight:700;color:var(--green);display:flex;align-items:center;gap:4px}
.stock-out{font-size:12px;font-weight:700;color:#b24d3f;display:flex;align-items:center;gap:4px}
.prod-price{font-size:22px;font-weight:900;color:var(--brand)}
.prod-price small{display:block;font-size:11px;font-weight:600;color:var(--muted);margin-top:1px}
.qty-row{display:flex;align-items:center;gap:8px;margin-top:auto}
.qty-input{width:60px;padding:8px 6px;border:1.5px solid var(--line);border-radius:8px;font-size:14px;text-align:center;font-family:inherit}
.qty-input:focus{outline:none;border-color:var(--accent)}
.btn{border:none;border-radius:10px;padding:9px 14px;font-weight:800;cursor:pointer;font-family:inherit;font-size:13px;transition:all .15s}
.btn:hover{opacity:.88;transform:translateY(-1px)}
.btn-brand{background:linear-gradient(135deg,var(--brand),var(--accent));color:#fff;box-shadow:0 6px 18px rgba(29,82,121,.2)}
.btn-soft{background:var(--soft);color:var(--text)}
.btn-green{background:linear-gradient(135deg,var(--green),#3a8a66);color:#fff;box-shadow:0 6px 18px rgba(46,111,82,.2)}
.btn-termin{background:#fff;border:1.5px solid var(--line);color:var(--muted);padding:6px 10px;font-size:12px}
.empty-msg{text-align:center;padding:40px 20px;color:var(--muted);border:2px dashed rgba(100,155,195,.25);border-radius:16px;background:rgba(255,255,255,.6)}
.empty-msg span{font-size:36px;display:block;margin-bottom:10px}
/* Cart */
.cart-sticky{position:sticky;top:16px}
.cart-head{padding:18px 20px;border-bottom:1px solid rgba(100,155,195,.18);display:flex;align-items:center;justify-content:space-between}
.cart-title{font-size:18px;font-weight:900;color:var(--text)}
.cart-count{font-size:13px;font-weight:700;color:var(--muted);background:var(--soft);padding:3px 10px;border-radius:99px}
.cart-body{padding:16px 18px}
.cart-list{display:flex;flex-direction:column;gap:8px;max-height:300px;overflow-y:auto}
.cart-item{padding:10px 12px;border:1px solid rgba(100,155,195,.18);border-radius:12px;background:linear-gradient(180deg,#fcfeff,#f4f8fb)}
.cart-item-name{font-weight:800;font-size:13px}
.cart-item-sub{font-size:12px;color:var(--muted);margin-top:2px}
.cart-item-row{display:flex;justify-content:space-between;align-items:center;margin-top:6px}
.cart-item-price{font-weight:800;font-size:14px;color:var(--brand)}
.btn-remove{background:none;border:none;color:#b24d3f;cursor:pointer;font-size:18px;padding:2px 4px;line-height:1}
.cart-empty{text-align:center;padding:28px 12px;color:var(--muted);font-size:13px}
/* Summary */
.summary{margin-top:14px;padding:16px;border:1px solid rgba(100,155,195,.2);border-radius:16px;background:linear-gradient(180deg,#f8fbfd,#edf4f8)}
.summary-label{font-size:10px;font-weight:900;letter-spacing:.1em;text-transform:uppercase;color:#8b6b2e;margin-bottom:10px}
.sum-row{display:flex;justify-content:space-between;font-size:14px;font-weight:700;padding:7px 0;border-top:1px solid rgba(100,155,195,.15)}
.sum-row:first-of-type{border-top:none;padding-top:0}
.sum-grand{padding:14px 16px;border-radius:14px;background:linear-gradient(135deg,var(--brand),var(--accent));color:#fff;display:flex;justify-content:space-between;align-items:center;margin-top:10px}
.sum-grand-label{font-size:14px;font-weight:800}
.sum-grand-val{font-size:22px;font-weight:900}
/* Order button */
.order-btn{width:100%;margin-top:12px;padding:14px;font-size:15px;font-weight:900;border:none;border-radius:14px;background:linear-gradient(135deg,#25D366,#1da851);color:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;box-shadow:0 8px 20px rgba(37,211,102,.25);transition:all .18s;font-family:inherit}
.order-btn:hover{transform:translateY(-2px);box-shadow:0 12px 28px rgba(37,211,102,.35)}
</style>
</head>

ce":95,"img":"https://s7g10.scene7.com/is/image/mannhummel/C_2775?qlt=82&ts=1771368111233&dpr=off","modeller":"Hyundai Accent Era 1.4,1.6","stock":true,"stokAdet":50}],"Polen":[{"id":"mn9b95x57rlr","name":"Hyundai Tucson, Accent Era Blue","oem":"97133 2E200","mann":"CU2336","price":55,"img":"https://s7g10.scene7.com/is/image/mannhummel/CU_2336?qlt=82&ts=1774287752827&dpr=off","modeller":"","stock":false,"stokAdet":0},{"id":"mn9bcwsvjgge","name":"Hyundai Accent Era","oem":"97133-1E100","mann":"CU2331","price":55,"img":"https://www.mann-filter.com/tr-tr/katalog/arama-sonuclar%C4%B1/urun.html/cu2331_mann-filter.html","modeller":"","stock":false,"stokAdet":0}],"Yakit":[]}}};
var STATE={wa:WA||"",logo:LOGO||"",data:DATA||{}};
var activeGroup="";
var activeType="";
var cart={};

function g(id){return document.getElementById(id);}
function money(n){return parseFloat(n||0).toLocaleString("tr-TR",{minimumFractionDigits:2,maximumFractionDigits:2})+" TL";}
function fmtDate(){return new Date().toLocaleDateString("tr-TR");}
function enc(v){return encodeURIComponent(v||"");}
function dec(v){return decodeURIComponent(v||"");}

function allProducts(){
  var out=[];
  Object.keys(DATA||{}).forEach(function(gk){
    var grp=DATA[gk]||{};
    Object.keys(grp.cats||{}).forEach(function(type){
      (grp.cats[type]||[]).forEach(function(p){
        var item=Object.assign({},p);
        item.groupKey=gk;
        item.groupLabel=grp.label||gk;
        item.type=type;
        out.push(item);
      });
    });
  });
  return out;
}

function findCustomerByPhone(phone){
  var clean=(phone||"").replace(/D/g,"");
  return (CUSTOMERS||[]).find(function(c){
    return ((c.tel||"").replace(/D/g,"")===clean)&&clean.length>5;
  });
}

function saveForm(){
  try{localStorage.setItem("astera_cf",JSON.stringify({ph:g("custPhone").value,nm:g("custName").value,fm:g("custFirm").value,inv:g("wantInvoice").checked,tn:g("custTaxNo").value,td:g("custTaxOffice").value}));}catch(e){}
}
function loadForm(){
  try{
    var d=JSON.parse(localStorage.getItem("astera_cf")||"{}");
    if(d.ph)g("custPhone").value=d.ph;
    if(d.nm)g("custName").value=d.nm;
    if(d.fm)g("custFirm").value=d.fm;
    if(d.inv)g("wantInvoice").checked=true;
    if(d.tn)g("custTaxNo").value=d.tn;
    if(d.td)g("custTaxOffice").value=d.td;
  }catch(e){}
  toggleInvoice();
}
function autofill(){
  var c=findCustomerByPhone(g("custPhone").value);
  if(!c)return;
  if(!g("custName").value)g("custName").value=c.ad||"";
  if(!g("custFirm").value)g("custFirm").value=c.firma||c.ad||"";
  if(c.vergiNo&&!g("custTaxNo").value)g("custTaxNo").value=c.vergiNo;
  if(c.vergiDairesi&&!g("custTaxOffice").value)g("custTaxOffice").value=c.vergiDairesi;
  saveForm();
}
function toggleInvoice(){
  var open=g("wantInvoice").checked;
  var wrap=g("invoiceFields");
  if(!wrap)return;
  wrap.className="invoice-grid"+(open?" open":"");
  wrap.style.display=open?"grid":"none";
  ["custTaxNo","custTaxOffice"].forEach(function(id){
    var inp=g(id);
    if(!inp)return;
    inp.disabled=!open;
    inp.required=open;
    if(!open)inp.value="";
  });
  renderCart();
}

function renderLogo(){
  var la=g("logoArea");
  if(!la)return;
  if(LOGO){la.innerHTML="<img src='"+LOGO+"' alt='Astera Ticaret'>";}
  else{la.innerHTML="<div class='logo-fb'>A</div>";}
}

function renderGroups(){
  var keys=Object.keys(DATA||{}).filter(function(k){
    return Object.keys((DATA[k]&&DATA[k].cats)||{}).some(function(t){return((DATA[k].cats||{})[t]||[]).length>0;});
  });
  if(!keys.length){keys=Object.keys(DATA||{});}
  if(!activeGroup&&keys.length){activeGroup=keys[0];}
  var tabsEl=g("groupTabs");
  if(!tabsEl)return;
  tabsEl.innerHTML=keys.map(function(k){
    return "<button class='tab"+(k===activeGroup?" active":"")+"' data-group='"+enc(k)+"'>"+(DATA[k]&&DATA[k].label||k)+"</button>";
  }).join("");
  tabsEl.querySelectorAll("[data-group]").forEach(function(btn){
    btn.onclick=function(){setGroup(dec(this.dataset.group));};
  });
}

function setGroup(key){
  activeGroup=key;
  var cats=Object.keys((DATA[key]&&DATA[key].cats)||{});
  activeType=cats.find(function(t){return((DATA[key].cats||{})[t]||[]).length>0;})||cats[0]||"";
  renderGroups();renderTypes();renderProducts();
}

function renderTypes(){
  var cats=Object.keys((DATA[activeGroup]&&DATA[activeGroup].cats)||{});
  if(!activeType&&cats.length){
    activeType=cats.find(function(t){return((DATA[activeGroup].cats||{})[t]||[]).length>0;})||cats[0];
  }
  var tabsEl=g("typeTabs");
  if(!tabsEl)return;
  tabsEl.innerHTML=cats.map(function(type){
    var count=(DATA[activeGroup]&&DATA[activeGroup].cats&&DATA[activeGroup].cats[type]||[]).length;
    var label=type==="Yag"?"Yağ":type==="Yakit"?"Yakıt":type;
    return "<button class='tab type-tab"+(type===activeType?" active":"")+"' data-type='"+enc(type)+"'>"+label+(count?" ("+count+")":"")+"</button>";
  }).join("");
  tabsEl.querySelectorAll("[data-type]").forEach(function(btn){
    btn.onclick=function(){setType(dec(this.dataset.type));};
  });
}

function setType(type){activeType=type;renderTypes();renderProducts();}

function filteredProducts(){
  var q=(g("search")&&g("search").value||"").toLowerCase().trim();
  var list=[];
  if(q){
    list=allProducts();
  }else{
    list=((DATA[activeGroup]&&DATA[activeGroup].cats&&DATA[activeGroup].cats[activeType])||[]).map(function(p){
      return Object.assign({},p,{groupKey:activeGroup,groupLabel:(DATA[activeGroup]&&DATA[activeGroup].label)||activeGroup,type:activeType});
    });
  }
  if(q){
    list=list.filter(function(p){
      return (p.name||"").toLowerCase().includes(q)||(p.mann||"").toLowerCase().includes(q)||(p.oem||"").toLowerCase().includes(q)||(p.groupLabel||"").toLowerCase().includes(q)||(p.modeller||"").toLowerCase().includes(q);
    });
  }
  return list;
}

function setQty(id,qty){
  qty=Math.max(0,parseInt(qty,10)||0);
  var p=allProducts().find(function(x){return x.id===id;});
  if(!p)return;
  if(qty===0)delete cart[id];
  else cart[id]={product:p,qty:qty};
  renderProducts();renderCart();
}

function sendTermin(id){
  var p=allProducts().find(function(x){return x.id===id;});
  if(!p||!WA)return;
  var msg="Merhaba, "+((p.mann||"bu ürün")+" ürününün termin tarihini öğrenebilir miyim?
Ürün: "+(p.name||""));
  window.open("https://wa.me/"+WA+"?text="+encodeURIComponent(msg),"_blank");
}

function renderProducts(){
  var products=filteredProducts();
  var el=g("products");
  if(!el)return;
  if(!products.length){
    el.innerHTML="<div class='empty-msg'><span>🔍</span>Ürün bulunamadı.<br><small>Farklı bir arama terimi deneyin.</small></div>";
    return;
  }
  el.innerHTML=products.map(function(p){
    var qty=cart[p.id]?cart[p.id].qty:0;
    var inStock=p.stock!==false&&(p.stokAdet==null||p.stokAdet>0);
    var imgHtml=p.img
      ?"<div class='prod-img-wrap'><img src='"+p.img+"' alt='' loading='lazy' onerror="this.style.display='none'"></div>"
      :"<div class='prod-img-wrap'><span class='prod-img-placeholder'>🔧</span></div>";
    var stockHtml=inStock
      ?"<div class='stock-ok'>✅ Stokta var</div>"
      :"<div class='stock-out'>❌ Stokta yok</div><button class='btn btn-termin' data-termin='"+enc(p.id)+"'>Termin tarihini sor</button>";
    var priceHtml=p.price>0
      ?"<div class='prod-price'>"+money(p.price)+"<small>KDV Hariç</small></div>"
      :"<div class='prod-price' style='font-size:14px;color:var(--muted)'>Fiyat için arayın</div>";
    return "<div class='product"+(inStock?"":" out")+"'>"
      +imgHtml
      +"<div class='prod-name'>"+(p.name||"")+"</div>"
      +"<div class='prod-meta'>"
      +"<div><strong>MANN:</strong> "+(p.mann||"–")+"</div>"
      +"<div><strong>OEM:</strong> "+(p.oem||"–")+"</div>"
      +(p.modeller?"<div><strong>Araç:</strong> "+(p.modeller).substring(0,50)+"</div>":"")
      +"</div>"
      +stockHtml
      +priceHtml
      +"<div class='qty-row'>"
      +"<input class='qty-input' type='number' min='0' value='"+qty+"' data-qty='"+enc(p.id)+"'>"
      +(p.price>0?"<button class='btn btn-brand' style='flex:1' data-add='"+enc(p.id)+"'>+ Sepete Ekle</button>":"")
      +"</div>"
      +"</div>";
  }).join("");
  el.querySelectorAll("[data-qty]").forEach(function(inp){inp.onchange=function(){setQty(dec(this.dataset.qty),this.value);};});
  el.querySelectorAll("[data-add]").forEach(function(btn){
    btn.onclick=function(){var id=dec(this.dataset.add);setQty(id,(cart[id]?cart[id].qty:0)+1);};
  });
  el.querySelectorAll("[data-termin]").forEach(function(btn){btn.onclick=function(){sendTermin(dec(this.dataset.termin));};});
}

function renderCart(){
  var ids=Object.keys(cart),inv=g("wantInvoice").checked;
  g("cartCount").textContent=ids.length+" ürün";
  if(!ids.length){
    g("cartList").innerHTML="<div class='cart-empty'>Sepetiniz boş.<br>Sol taraftan ürün ekleyin.</div>";
    g("subRow").style.display="none";
    g("vatRow").style.display="none";
    g("cartTotal").textContent="0,00 TL";
    return;
  }
  var subtotal=0;
  g("cartList").innerHTML=ids.map(function(id){
    var item=cart[id],line=(item.product.price||0)*item.qty;
    subtotal+=line;
    return "<div class='cart-item'>"
      +"<div class='cart-item-name'>"+(item.product.mann||"")+"</div>"
      +"<div class='cart-item-sub'>"+(item.product.name||"").substring(0,40)+"</div>"
      +"<div class='cart-item-sub'>"+item.qty+" adet × "+money(item.product.price||0)+"</div>"
      +"<div class='cart-item-row'>"
      +"<span class='cart-item-price'>"+money(line)+"</span>"
      +"<button class='btn-remove' data-remove='"+enc(id)+"' title='Kaldır'>×</button>"
      +"</div></div>";
  }).join("");
  var vat=inv?subtotal*0.2:0;
  g("subRow").style.display="flex";
  g("cartSubtotal").textContent=money(subtotal);
  g("vatRow").style.display=inv?"flex":"none";
  g("cartVat").textContent=money(vat);
  g("cartTotal").textContent=money(subtotal+vat);
  g("cartList").querySelectorAll("[data-remove]").forEach(function(btn){
    btn.onclick=function(){setQty(dec(this.dataset.remove),0);};
  });
}

function buildMessage(){
  var ids=Object.keys(cart),inv=g("wantInvoice").checked;
  var msg="ASTERA YENİ SİPARİŞ
";
  msg+="Tarih: "+fmtDate()+"
";
  msg+="Müşteri: "+(g("custName").value||g("custFirm").value||"Belirtilmedi")+"
";
  if(g("custPhone").value)msg+="Telefon: +90 "+g("custPhone").value+"
";
  if(g("custFirm").value)msg+="Firma: "+g("custFirm").value+"
";
  if(inv){
    msg+="Fatura: Evet
";
    if(g("custTaxNo").value)msg+="Vergi No: "+g("custTaxNo").value+"
";
    if(g("custTaxOffice").value)msg+="Vergi Dairesi: "+g("custTaxOffice").value+"
";
  }
  msg+="─────────────────
";
  var subtotal=0;
  ids.forEach(function(id){
    var item=cart[id],line=(item.product.price||0)*item.qty;
    subtotal+=line;
    var inStock=item.product.stock!==false&&(item.product.stokAdet==null||item.product.stokAdet>0);
    msg+=item.product.mann+" × "+item.qty+" = "+money(line)+(inStock?"":" ⚠ Termin?")+"
";
  });
  var vat=inv?subtotal*0.2:0;
  msg+="─────────────────
";
  msg+="Ara Toplam: "+money(subtotal)+"
";
  if(inv)msg+="KDV %20: "+money(vat)+"
";
  msg+="GENEL TOPLAM: "+money(subtotal+vat);
  return msg;
}

function sendOrder(){
  if(!Object.keys(cart).length){alert("Önce ürün ekleyin.");return;}
  if(!g("custName").value&&!g("custFirm").value&&!g("custPhone").value){
    if(!confirm("Müşteri bilgisi girilmedi. Yine de göndermek istiyor musunuz?"))return;
  }
  window.open("https://wa.me/"+WA+"?text="+encodeURIComponent(buildMessage()),"_blank");
}

window.onload=function(){
  renderLogo();
  loadForm();
  renderGroups();renderTypes();renderProducts();renderCart();
  g("search").oninput=renderProducts;
  g("custPhone").oninput=function(){autofill();saveForm();};
  g("custName").oninput=saveForm;
  g("custFirm").oninput=saveForm;
  g("custTaxNo").oninput=saveForm;
  g("custTaxOffice").oninput=saveForm;
  g("wantInvoice").onchange=function(){toggleInvoice();saveForm();};
  g("sendBtn").onclick=sendOrder;
};
</script>
</body>
</html>
